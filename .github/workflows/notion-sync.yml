name: Sync Notion to GitHub

on:
  schedule:
    # 01:00 UTC daily.
    # London: 1 AM in winter (GMT), 2 AM in summer (BST) — DST shift is fine.
    - cron: "0 1 * * *"
  workflow_dispatch: {} # allows manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: notion-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Export Notion pages to Markdown
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_ROOT_PAGE_ID: ${{ secrets.NOTION_ROOT_PAGE_ID }}
          OUTPUT_DIR: notion
        run: npm run export

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add notion
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync Notion study logs ($(date -u +'%Y-%m-%d'))"
            git push
          fi
